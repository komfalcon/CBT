name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ secrets.DO_REGISTRY }}/jamb-cbt-backend:${{ github.sha }} .

      - name: Authenticate to DigitalOcean Container Registry
        run: echo "${{ secrets.DO_REGISTRY_TOKEN }}" | docker login ${{ secrets.DO_REGISTRY }} -u ${{ secrets.DO_REGISTRY_USER }} --password-stdin

      - name: Push Docker image
        run: docker push ${{ secrets.DO_REGISTRY }}/jamb-cbt-backend:${{ github.sha }}

      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_name: jamb-cbt-backend
          spec_location: ../.do/app.yaml
