name: Keep Backend Alive

on:
  schedule:
    # Runs every 5 minutes (the minimum allowed by GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          # Replace this URL with your actual production backend URL once deployed
          curl -f -s -o /dev/null -w "%{http_code}\n" https://cbt-vl4x.onrender.com/api/health || echo "Failed to ping, but continuing"
